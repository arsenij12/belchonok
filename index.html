<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💕 Pop the Bubbles!</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(135deg, #ffd6e7 0%, #ffecf5 40%, #d6eaff 100%);
    min-height: 100vh;
    overflow: hidden;
    cursor: crosshair;
    user-select: none;
  }

  .heart-bg {
    position: fixed;
    opacity: 0.12;
    pointer-events: none;
    animation: driftHeart linear infinite;
    font-size: 1.5rem;
  }

  @keyframes driftHeart {
    0%   { transform: translateY(110vh) rotate(0deg); }
    100% { transform: translateY(-20vh) rotate(30deg); }
  }

  #hud {
    position: fixed;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 28px;
    background: rgba(255,255,255,0.55);
    backdrop-filter: blur(12px);
    border-bottom: 2px solid rgba(255,180,210,0.4);
    z-index: 100;
  }

  #title {
    font-size: 1.4rem;
    font-weight: 900;
    color: #e06fa0;
  }

  #score-box {
    display: flex;
    align-items: center;
    gap: 8px;
    background: linear-gradient(135deg, #ff8ec2, #ff6aaa);
    color: white;
    font-weight: 900;
    font-size: 1.1rem;
    padding: 7px 18px;
    border-radius: 50px;
    box-shadow: 0 4px 15px rgba(255,100,170,0.4);
    transition: transform 0.1s;
  }

  #score-box.bump { transform: scale(1.18); }

  #progress-bar-wrap {
    width: 180px;
    height: 12px;
    background: rgba(255,180,210,0.3);
    border-radius: 50px;
    overflow: hidden;
    border: 1.5px solid rgba(255,180,210,0.5);
  }

  #progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #ff8ec2, #ff5ba0);
    border-radius: 50px;
    transition: width 0.3s ease;
  }

  #game {
    position: fixed;
    inset: 0;
    top: 68px;
  }

  .bubble {
    position: absolute;
    border-radius: 50%;
    cursor: pointer;
    animation: floatUp linear forwards;
    overflow: hidden;
    border: 3px solid rgba(255,255,255,0.8);
    box-shadow:
      inset -6px -6px 14px rgba(255,255,255,0.45),
      inset 4px 4px 10px rgba(255,255,255,0.7),
      0 6px 24px rgba(0,0,0,0.12);
    transition: transform 0.1s;
  }

  .bubble:hover { transform: scale(1.08); }

  .bubble img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%;
    pointer-events: none;
  }

  /* glossy overlay */
  .bubble::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.55) 0%, rgba(255,255,255,0.0) 65%);
    pointer-events: none;
  }

  @keyframes floatUp {
    0%   { transform: translateY(0) scale(1); opacity: 0.95; }
    100% { transform: translateY(-110vh) scale(0.85); opacity: 0; }
  }

  .pop-burst {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    animation: popBurst 0.45s ease-out forwards;
    border: 3px solid rgba(255,130,190,0.6);
  }

  @keyframes popBurst {
    0%   { transform: scale(0.6); opacity: 1; }
    100% { transform: scale(3.2); opacity: 0; }
  }

  .pop-text {
    position: fixed;
    font-weight: 900;
    font-size: 1.4rem;
    color: #e06fa0;
    pointer-events: none;
    animation: floatScore 0.9s ease-out forwards;
    text-shadow: 0 2px 8px rgba(224,111,160,0.4);
    z-index: 200;
  }

  @keyframes floatScore {
    0%   { transform: translateY(0) scale(1); opacity: 1; }
    100% { transform: translateY(-70px) scale(1.3); opacity: 0; }
  }

  #win-overlay {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 999;
  }

  #win-overlay.show {
    display: flex;
    background: rgba(255,220,235,0.7);
    backdrop-filter: blur(10px);
  }

  #win-card {
    background: white;
    border-radius: 32px;
    padding: 50px 60px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(255,100,170,0.3);
    animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }

  @keyframes popIn {
    0%   { transform: scale(0.5) rotate(-5deg); opacity: 0; }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }

  #win-card h1 {
    font-size: 2.6rem;
    font-weight: 900;
    color: #e06fa0;
    margin-bottom: 10px;
  }

  #win-card p {
    font-size: 1.1rem;
    color: #aaa;
    margin-bottom: 28px;
  }

  #win-btn {
    background: linear-gradient(135deg, #ff8ec2, #ff5ba0);
    color: white;
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 1.2rem;
    border: none;
    padding: 16px 40px;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 8px 25px rgba(255,100,170,0.4);
    transition: transform 0.15s, box-shadow 0.15s;
  }

  #win-btn:hover {
    transform: scale(1.06) translateY(-2px);
    box-shadow: 0 12px 30px rgba(255,100,170,0.5);
  }
</style>
</head>
<body>

<div id="hud">
  <div id="title">💕 Pop the Bubbles!</div>
  <div id="progress-bar-wrap">
    <div id="progress-bar"></div>
  </div>
  <div id="score-box">⭐ <span id="score">0</span> / 100</div>
</div>

<div id="game"></div>

<div id="win-overlay">
  <div id="win-card">
    <div style="font-size:3.5rem; margin-bottom:12px">🎉💕🎊</div>
    <h1>You did it!</h1>
    <p>100 points! You're amazing~ 🌸</p>
    <button id="win-btn" onclick="window.location.href='belchonok.html'">Open your surprise 🎁</button>
  </div>
</div>

  ];

  const BUBBLE_BORDERS = [
    'rgba(255,150,200,0.8)',
    'rgba(180,200,255,0.8)',
    'rgba(255,220,130,0.8)',
    'rgba(220,180,255,0.8)',
    'rgba(180,240,200,0.8)',
    'rgba(255,180,160,0.8)',
    'rgba(255,210,100,0.8)',
  ];

  let score = 0;
  let gameOver = false;
  const game = document.getElementById('game');
  const scoreEl = document.getElementById('score');
  const progressBar = document.getElementById('progress-bar');
  const scoreBox = document.getElementById('score-box');

  function spawnBubble() {
    if (gameOver) return;
    const bubble = document.createElement('div');
    bubble.className = 'bubble';

    const size = 70 + Math.random() * 60;
    const x = Math.random() * (window.innerWidth - size);
    const duration = 5 + Math.random() * 5;
    const points = size < 90 ? 10 : size < 110 ? 5 : 3;
    const imgSrc = IMAGES[Math.floor(Math.random() * IMAGES.length)];
    const border = BUBBLE_BORDERS[Math.floor(Math.random() * BUBBLE_BORDERS.length)];

    bubble.style.cssText = `
      width: ${size}px;
      height: ${size}px;
      left: ${x}px;
      bottom: -${size}px;
      border-color: ${border};
      animation-duration: ${duration}s;
    `;

    const img = document.createElement('img');
    img.src = imgSrc;
    bubble.appendChild(img);

    bubble.addEventListener('click', (e) => {
      e.stopPropagation();
      if (gameOver) return;
      const rect = bubble.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      bubble.remove();

      // Burst ring
      const burst = document.createElement('div');
      burst.className = 'pop-burst';
      burst.style.cssText = `width:${rect.width}px;height:${rect.height}px;left:${rect.left}px;top:${rect.top}px;`;
      document.body.appendChild(burst);
      setTimeout(() => burst.remove(), 450);

      // Score float
      const txt = document.createElement('div');
      txt.className = 'pop-text';
      txt.textContent = '+' + points;
      txt.style.cssText = `left:${cx - 20}px;top:${cy - 20}px;`;
      document.body.appendChild(txt);
      setTimeout(() => txt.remove(), 900);

      score = Math.min(100, score + points);
      scoreEl.textContent = score;
      progressBar.style.width = score + '%';
      scoreBox.classList.add('bump');
      setTimeout(() => scoreBox.classList.remove('bump'), 150);

      if (score >= 100) {
        gameOver = true;
        clearInterval(spawnInterval);
        setTimeout(() => {
          const ov = document.getElementById('win-overlay');
          ov.style.display = 'flex';
          setTimeout(() => ov.classList.add('show'), 10);
        }, 400);
      }
    });

    game.appendChild(bubble);
    setTimeout(() => { if (bubble.parentNode) bubble.remove(); }, duration * 1000);
  }

  // Initial bubbles
  for (let i = 0; i < 5; i++) setTimeout(spawnBubble, i * 200);

  // Spawn interval — speed up with score
  let spawnInterval = setInterval(() => {
    if (!gameOver) {
      const count = score < 30 ? 1 : score < 60 ? 2 : 3;
      for (let i = 0; i < count; i++) spawnBubble();
    }
  }, 900);
</script>
